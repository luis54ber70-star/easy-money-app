<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Money - Gana Dinero Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-900 text-white font-sans">

    <nav class="bg-gray-800 p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-green-400">EASY <span class="text-white">MONEY</span></h1>
            <div class="bg-gray-700 px-4 py-2 rounded-full flex items-center">
                <i class="fas fa-coins text-yellow-400 mr-2"></i>
                <span id="user-balance" class="font-bold">0.00</span> <span class="ml-1 text-xs text-gray-400">USD</span>
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-4 space-y-8">
        
        <section>
            <h2 class="text-xl font-semibold mb-4">Misiones Disponibles</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                
                <div class="bg-gray-800 border-l-4 border-blue-500 p-5 rounded-lg shadow-md hover:scale-105 transition-transform cursor-pointer" onclick="openOffer('encuestas')">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg">Panel de Encuestas</h3>
                            <p class="text-gray-400 text-sm">Gana hasta $2.50 por encuesta.</p>
                        </div>
                        <i class="fas fa-poll-h text-blue-500 text-2xl"></i>
                    </div>
                    <button class="mt-4 w-full bg-blue-600 hover:bg-blue-700 py-2 rounded font-bold text-sm">EMPEZAR</button>
                </div>

                <div class="bg-gray-800 border-l-4 border-green-500 p-5 rounded-lg shadow-md hover:scale-105 transition-transform cursor-pointer" onclick="openOffer('tareas')">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg">Muro de Tareas</h3>
                            <p class="text-gray-400 text-sm">Descarga apps y completa niveles.</p>
                        </div>
                        <i class="fas fa-tasks text-green-500 text-2xl"></i>
                    </div>
                    <button class="mt-4 w-full bg-green-600 hover:bg-green-700 py-2 rounded font-bold text-sm">VER MURO</button>
                </div>

                <div class="bg-gray-800 border-l-4 border-purple-500 p-5 rounded-lg shadow-md hover:scale-105 transition-transform cursor-pointer" onclick="openOffer('juegos')">
                    <div class="flex justify-between items-start">
                        <div>
                            <h3 class="font-bold text-lg">Mini Juegos</h3>
                            <p class="text-gray-400 text-sm">Juega y acumula puntos por minuto.</p>
                        </div>
                        <i class="fas fa-gamepad text-purple-500 text-2xl"></i>
                    </div>
                    <button class="mt-4 w-full bg-purple-600 hover:bg-purple-700 py-2 rounded font-bold text-sm">JUGAR YA</button>
                </div>

            </div>
        </section>

        <section class="bg-gray-800 p-6 rounded-xl">
            <h2 class="text-lg font-bold mb-4 flex items-center">
                <i class="fas fa-history mr-2 text-gray-400"></i> Actividad Reciente
            </h2>
            <div id="activity-log" class="text-sm text-gray-400 space-y-2">
                <p>Cargando actividades recientes...</p>
            </div>
        </section>

    </main>

    <script src="script.js"></script>
</body>
</html>
