<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Money - Gana Dinero Real</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f172a; color: white; }
        .card-gradient { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); }
    </style>
</head>
<body class="font-sans antialiased">

    <header class="p-6 text-center">
        <h1 class="text-2xl font-bold text-blue-400 mb-2">EASY MONEY</h1>
        <div class="card-gradient p-6 rounded-3xl border border-gray-700 shadow-2xl inline-block min-w-[280px]">
            <p class="text-gray-400 text-sm uppercase tracking-widest mb-1">Tu Saldo Total</p>
            <div class="text-4xl font-mono font-bold text-green-400">
                $<span id="user-balance">0.00</span>
            </div>
        </div>
    </header>

    <main class="px-6 space-y-4 max-w-md mx-auto">
        
        <button onclick="openOffer('encuestas')" 
                class="w-full bg-blue-600 hover:bg-blue-700 active:scale-95 transition-all p-5 rounded-2xl flex items-center justify-between shadow-lg group">
            <div class="flex items-center space-x-4">
                <div class="bg-blue-500/30 p-3 rounded-xl group-hover:bg-blue-500/50">
                    <i class="fas fa-poll text-2xl"></i>
                </div>
                <div class="text-left">
                    <h3 class="font-bold text-lg text-white">Muro de Encuestas</h3>
                    <p class="text-xs text-blue-200">Gana hasta $5.00 USD por encuesta</p>
                </div>
            </div>
            <i class="fas fa-chevron-right text-blue-300"></i>
        </button>

        <button onclick="openOffer('tareas')" 
                class="w-full bg-gray-800 hover:bg-gray-700 active:scale-95 transition-all p-5 rounded-2xl flex items-center justify-between border border-gray-700">
            <div class="flex items-center space-x-4">
                <div class="bg-gray-700 p-3 rounded-xl">
                    <i class="fas fa-tasks text-2xl text-gray-400"></i>
                </div>
                <div class="text-left">
                    <h3 class="font-bold text-lg text-gray-300">Tareas Diarias</h3>
                    <p class="text-xs text-gray-500">Próximamente disponible</p>
                </div>
            </div>
            <i class="fas fa-lock text-gray-600 text-sm"></i>
        </button>

    </main>

    <section class="mt-8 px-6 max-w-md mx-auto">
        <h2 class="text-sm font-semibold text-gray-500 uppercase mb-3 ml-2">Actividad Reciente</h2>
        <div id="activity-log" class="space-y-3">
            <div class="bg-gray-800/30 p-4 rounded-2xl border border-gray-800 text-center">
                <p class="text-xs text-gray-600 italic">No hay actividad reciente</p>
            </div>
        </div>
    </section>

    <nav class="fixed bottom-0 left-0 right-0 bg-slate-900 border-t border-gray-800 p-4 flex justify-around items-center">
        <button class="text-blue-400 flex flex-col items-center">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] mt-1">Inicio</span>
        </button>
        <button onclick="alert('Mínimo de retiro: $10.00 USD')" class="text-gray-500 flex flex-col items-center">
            <i class="fas fa-wallet text-xl"></i>
            <span class="text-[10px] mt-1">Retiros</span>
        </button>
        <button class="text-gray-500 flex flex-col items-center">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[10px] mt-1">Perfil</span>
        </button>
    </nav>

    <script src="script.js"></script>
</body>
</html>
