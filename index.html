<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Money App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0f1a; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="pb-20">

    <div class="p-8 text-center">
        <h1 class="text-xl font-bold text-blue-500 mb-4 tracking-widest">EASY MONEY</h1>
        <div class="glass-card p-6 rounded-[2rem] shadow-2xl">
            <p class="text-gray-400 text-xs mb-1">SALDO DISPONIBLE</p>
            <div class="text-5xl font-bold text-green-400">
                $<span id="user-balance">0.00</span>
            </div>
        </div>
    </div>

    <div class="px-6 space-y-4">
        <button onclick="openOffer('encuestas')" class="w-full bg-blue-600 p-5 rounded-2xl flex items-center shadow-lg active:scale-95 transition-transform">
            <i class="fas fa-poll text-2xl mr-4"></i>
            <div class="text-left">
                <p class="font-bold">Muro de Encuestas</p>
                <p class="text-xs text-blue-200">Gana dinero por tu opinión</p>
            </div>
        </button>

        <button onclick="openOffer('tareas')" class="w-full bg-gray-800 p-5 rounded-2xl flex items-center opacity-50 cursor-not-allowed">
            <i class="fas fa-play-circle text-2xl mr-4 text-gray-400"></i>
            <div class="text-left">
                <p class="font-bold text-gray-400">Ver Videos</p>
                <p class="text-xs text-gray-500">Próximamente</p>
            </div>
        </button>
    </div>

    <div class="fixed bottom-0 w-full bg-[#0f172a] border-t border-gray-800 p-4 flex justify-around text-gray-500">
        <div class="text-blue-500 flex flex-col items-center">
            <i class="fas fa-home"></i><span class="text-[10px]">Inicio</span>
        </div>
        <div onclick="alert('Mínimo de retiro: $10.00 USD')" class="flex flex-col items-center">
            <i class="fas fa-wallet"></i><span class="text-[10px]">Retirar</span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
